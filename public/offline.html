<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>Copa Facil sin conexion</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f4;
        color: #111827;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 460px);
        display: grid;
        gap: 14px;
        text-align: center;
      }

      img {
        width: 64px;
        height: 64px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 8vw, 2.8rem);
        line-height: 0.95;
      }

      p {
        margin: 0;
        color: #64748b;
        font-size: 1rem;
      }

      a {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-height: 44px;
        margin: 8px auto 0;
        padding: 0 18px;
        border-radius: 8px;
        background: #0f766e;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon.svg" alt="" />
      <h1>Sin conexion</h1>
      <p>No se pueden cargar datos nuevos ahora mismo. Cuando vuelva la conexion, Copa Facil se actualizara sola.</p>
      <a href="/">Volver</a>
    </main>
  </body>
</html>
