services:
  - type: web
    name: copa-facil
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_STORE
        value: firestore
      - key: FIREBASE_PROJECT_ID
        value: copafacil-89df8
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIRESTORE_COLLECTION
        value: copaFacil
      - key: FIRESTORE_DOCUMENT
        value: production
